<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memoryelaine — Log Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>memoryelaine</h1>
            <div class="controls">
                <input id="query-filter" type="text" placeholder="Query (e.g. status:200 path:/chat hello)...">
                <button id="refresh-btn">Refresh</button>
                <label><input id="auto-refresh" type="checkbox"> Auto</label>
                <button id="recording-toggle-btn" class="recording-on">Recording: ON</button>
            </div>
        </header>
        <table id="log-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Time</th>
                    <th>Method</th>
                    <th>Path</th>
                    <th>Status</th>
                    <th>Duration</th>
                    <th>Req Size</th>
                    <th>Resp Size</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
        <div class="pagination">
            <button id="prev-btn" disabled>← Prev</button>
            <span id="page-info"></span>
            <button id="next-btn">Next →</button>
        </div>
        <div id="detail-overlay" class="hidden">
            <div class="detail-panel">
                <button id="close-detail">✕</button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
